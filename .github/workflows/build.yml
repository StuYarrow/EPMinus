name: Release

on:
  push:
    branches: [ release ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
    - name: Get major version
      id: get_major_version
      uses: mavrosxristoforos/get-xml-info@2.0
      with:
        xml-file: './GlobalAssemblyInfo.csproj'
        xpath: '//MajorVersion'
    - name: Get minor version
      id: get_minor_version
      uses: mavrosxristoforos/get-xml-info@2.0
      with:
        xml-file: './GlobalAssemblyInfo.csproj'
        xpath: '//MinorVersion'
    - name: Get build number
      id: get_build_number
      env:
        major: ${{ steps.get_major_version.outputs.info }}
        minor: ${{ steps.get_minor_version.outputs.info }}
      run: echo "build_number=`bash ./get-build-number.sh -M ${major} -m ${minor}`" >> $GITHUB_OUTPUT
    - name: Restore
      run: dotnet restore ./EPPlus.solution
    - name: Build
      run: >
        dotnet build
        -c Release
        --no-restore
        -p:BuildNumber=${{ steps.get_build_number.outputs.build_number }}
        ./EPPlus.solution
    - name: Test
      run: >
        dotnet test
        -c Release
        --no-restore
        --no-build
        ./EPPlus.solution
    - name: Pack
      run: >
        dotnet pack
        -c Release
        --no-restore
        --no-build
        -p:BuildNumber=${{ steps.get_build_number.outputs.build_number }}
        ./EPPlus/EPPlus.csproj
    - name: Push package
      run: >
       dotnet nuget push
       ./EPPlus/bin/Release/*.nupkg
       -k ${GITHUB_TOKEN}
       -s https://nuget.pkg.github.com/StuYarrow/index.json
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Tag repo with version
      uses: rickstaa/action-create-tag@v1
      with:
        tag: v${{ steps.get_major_version.outputs.info }}.${{ steps.get_minor_version.outputs.info }}.${{ steps.get_build_number.outputs.build_number }}
